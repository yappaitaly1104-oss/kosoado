<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>はい句づくりアプリ - 国語</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            /* 和風の背景色 */
            background-color: #fcfaf2; 
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .writing-vertical {
            writing-mode: vertical-rl;
            text-orientation: upright;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

<!-- なまえ入力モーダル -->
<div id="name-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl border-4 border-emerald-400">
        <div class="text-6xl mb-4">📛</div>
        <h2 class="text-2xl font-black text-slate-800 mb-2">なまえを おしえてね</h2>
        <input type="text" id="student-name-input" placeholder="ひらがな または 漢字" class="w-full bg-slate-50 border-2 border-slate-300 rounded-xl px-4 py-3 text-lg font-bold text-center mb-6 focus:outline-none focus:border-emerald-500">
        <button onclick="saveName()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-3 rounded-xl border-b-4 border-emerald-700 shadow">
            スタート！
        </button>
    </div>
</div>

<!-- 通知用トースト -->
<div id="toast-container" class="fixed top-5 right-5 z-50 pointer-events-none"></div>

<div class="w-full max-w-2xl bg-white rounded-3xl shadow-lg border-4 border-emerald-200 overflow-hidden">
    <!-- ヘッダー -->
    <div class="bg-emerald-500 p-4 text-white flex justify-between items-center">
        <h1 class="text-2xl font-black flex items-center">🎋 はい句づくり</h1>
        <span id="display-student-name" class="bg-emerald-700 px-3 py-1 rounded-full text-sm font-bold shadow-inner"></span>
    </div>

    <div class="p-6 md:p-10 space-y-8">
        <div class="text-center space-y-2">
            <h2 class="text-lg font-bold text-slate-700">五・七・五 で言葉をつないでみよう！</h2>
            <p class="text-sm text-slate-500">季語（きご：季節の言葉）をひとつ入れると、かっこいいよ。</p>
        </div>

        <!-- 入力エリア -->
        <div class="space-y-4">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center font-black text-xl shadow-inner">五</div>
                <input type="text" id="input-1" placeholder="上五 (かみご) をいれる" class="flex-1 bg-slate-50 border-2 border-slate-200 rounded-xl p-3 text-lg focus:border-emerald-500 outline-none transition-all" oninput="updatePreview()">
            </div>
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-black text-xl shadow-inner">七</div>
                <input type="text" id="input-2" placeholder="中七 (なかしち) をいれる" class="flex-1 bg-slate-50 border-2 border-slate-200 rounded-xl p-3 text-lg focus:border-emerald-500 outline-none transition-all" oninput="updatePreview()">
            </div>
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center font-black text-xl shadow-inner">五</div>
                <input type="text" id="input-3" placeholder="下五 (しもご) をいれる" class="flex-1 bg-slate-50 border-2 border-slate-200 rounded-xl p-3 text-lg focus:border-emerald-500 outline-none transition-all" oninput="updatePreview()">
            </div>
        </div>

        <!-- プレビュー短冊 -->
        <div class="flex justify-center py-6">
            <div class="relative bg-[url('https://www.transparenttextures.com/patterns/rice-paper-2.png')] bg-[#fdfaf3] border border-[#e5e0d8] shadow-md px-10 py-16 flex space-x-6 writing-vertical text-2xl md:text-3xl font-serif text-slate-800 min-h-[300px]">
                <div id="preview-1" class="min-h-[5em]"></div>
                <div id="preview-2" class="min-h-[7em] mt-8"></div>
                <div id="preview-3" class="min-h-[5em] mt-16"></div>
                <!-- 署名 -->
                <div id="preview-name" class="text-base text-slate-500 mt-20"></div>
            </div>
        </div>

        <!-- 送信ボタン -->
        <button onclick="submitHaiku()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-2xl border-b-4 border-emerald-700 shadow-lg text-lg transform transition active:scale-95 flex items-center justify-center space-x-2">
            <span>先生に作品を送る</span>
            <span>🚀</span>
        </button>
    </div>
</div>

<script>
// ==========================================
// Google Apps Script (GAS) 連携設定
// ==========================================
// ★★★ 先生へ：ここにGASのWebアプリURLを貼り付けてください ★★★
const GAS_URL = "https://script.google.com/a/macros/edu.city.yokohama.jp/s/AKfycbz-CJ9CDpx8vXMJ5GPNIFE8XboXLU0jnVViL4OORSKYor5b0WxWvn89418Jm3D8QLwNmQ/exec";
// ==========================================

let studentName = localStorage.getItem("studentName") || "";

window.addEventListener('DOMContentLoaded', () => {
    if (!studentName) {
        document.getElementById('name-modal').classList.remove('hidden');
    } else {
        setNameDisplay();
    }
});

function saveName() {
    const nameInput = document.getElementById('student-name-input').value.trim();
    if (nameInput) {
        studentName = nameInput;
        localStorage.setItem("studentName", studentName);
        document.getElementById('name-modal').classList.add('hidden');
        setNameDisplay();
        showToast(`${studentName}さん、いい句を作ってね！`);
    } else {
        alert("なまえを入力してね！");
    }
}

function setNameDisplay() {
    document.getElementById('display-student-name').textContent = studentName;
    document.getElementById('preview-name').textContent = studentName;
}

function updatePreview() {
    document.getElementById('preview-1').textContent = document.getElementById('input-1').value;
    document.getElementById('preview-2').textContent = document.getElementById('input-2').value;
    document.getElementById('preview-3').textContent = document.getElementById('input-3').value;
}

function submitHaiku() {
    if (!studentName) {
        alert("なまえが設定されていません。");
        return;
    }

    const p1 = document.getElementById('input-1').value.trim();
    const p2 = document.getElementById('input-2').value.trim();
    const p3 = document.getElementById('input-3').value.trim();

    if (!p1 && !p2 && !p3) {
        alert("はい句を入力してね！");
        return;
    }

    const fullHaiku = `${p1} ${p2} ${p3}`;

    // URLが初期値のままならエラーを出さずにトーストだけ表示（デモ用）
    if (GAS_URL === "ここにURLを貼り付けます" || !GAS_URL) {
        console.warn("GAS_URLが未設定です。送信処理をスキップします。");
        showToast("先生に作品を送りました！（テスト）✨");
        return;
    }

    const payload = {
        name: studentName,
        appName: "はい句づくり",
        modeName: "自由創作",
        totalQuestions: "-",
        correctAnswers: "-",
        correctRate: "-",
        haikuText: fullHaiku
    };

    showToast("先生に作品を送っています...⏳");

    fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
            "Content-Type": "text/plain",
        },
        body: JSON.stringify(payload)
    })
    .then(() => {
        setTimeout(() => showToast("先生に作品がとどきました！✨"), 1000);
        // 送信後、入力欄をクリアするかどうかは運用次第（今回はそのまま残す）
    })
    .catch((error) => {
        console.error("送信エラー:", error);
        showToast("送信に失敗しちゃったみたい💦");
    });
}

function showToast(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'bg-slate-800 text-white text-sm font-bold px-4 py-3 rounded-xl shadow-lg border border-slate-700 mb-2 transform transition-all duration-300 opacity-0 translate-x-10';
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.classList.remove('opacity-0', 'translate-x-10'), 10);
    setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-x-10');
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
</script>
</body>
</html>
